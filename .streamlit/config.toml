[server]
# Exclude the venv and large ML packages from file watching
# This eliminates the hundreds of [transformers] warnings on startup
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#B165FB"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1E1E1E"
textColor = "#FAFAFA"
